<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clip Maker</title>
</head>

<body>
    <h1>ClipMaker</h1>

    <button id="upload_widget" class="cloudinary-button">Upload files</button>

    <script src="https://upload-widget.cloudinary.com/latest/global/all.js" type="text/javascript"></script>



    <script type="text/javascript">

        const app = {
            public_id: '',
            transcriptionURL: '',
            waitForTranscription: async () => {
                const maxAttempts = 30;
                const delayMs = 2000; // 2 segundos entre tentativas

                for (let attempt = 1; attempt <= maxAttempts; attempt++) {
                    try {
                        const transcriptURL = `https://res.cloudinary.com/${config.cloudName}/raw/upload/v${Date.now()}/${app.public_id}.transcript`;
                        app.transcriptionURL = transcriptURL;

                        const response = await fetch(transcriptURL);
                        if (response.ok) {
                            const transcript = await response.text();
                            console.log(`Transcrição obtida na tentativa ${attempt}:`, app.transcriptionURL);
                            return transcript;
                        }
                    } catch (error) {
                        console.log(`Tentativa ${attempt}/${maxAttempts} falhou:`, error.message);
                    }

                    // Aguarda antes da próxima tentativa
                    if (attempt < maxAttempts) {
                        await new Promise(resolve => setTimeout(resolve, delayMs));
                    }
                }

                console.warn('Transcrição não foi obtida após 30 tentativas');
                return null;
            },
            getTranscription: async () => {
                const response = await fetch(transcriptionURL)
                return response
            },
            getViralMoment: async () => { 
                const transcription = await app.getTranscription()
            }
        }

        const config = {
            cloudName: 'draksujzz',
            uploadPreset: 'clipmaker_nlw'
        }

        var myWidget = cloudinary.createUploadWidget(config,
            async (error, result) => {
                if (!error && result && result.event === "success") {
                    console.log('Done! Here is the image info: ', result.info);
                    app.public_id = result.info.public_id;

                    const isReady = await app.waitForTranscription();
                }
            }
        )

        document.getElementById("upload_widget").addEventListener("click", function () {
            myWidget.open();
        }, false);

    </script>
</body>

</html>
